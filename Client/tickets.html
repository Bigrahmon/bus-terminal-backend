<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riderr | My Tickets</title>
  <meta name="description" content="View and manage your Riderr booked tickets. Access your QR codes, trip details, and live GPS tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Page-level tokens ── */
    :root {
      --ticket-bg: rgba(255,255,255,0.03);
      --ticket-border: rgba(255,255,255,0.08);
      --ticket-radius: 20px;
      --accent: #4f8eff;
      --accent-glow: rgba(79,142,255,0.25);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    /* ── Page Heading ── */
    .page-panel { animation: fadeInUp 0.5s ease both; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading / Error states ── */
    .state-box {
      text-align: center;
      padding: 60px 40px;
      background: var(--ticket-bg);
      border: 1px dashed var(--ticket-border);
      border-radius: var(--ticket-radius);
      color: var(--text-muted, #8a9ab5);
    }
    .state-box .state-icon { font-size: 3rem; margin-bottom: 16px; }
    .state-box h3 { margin: 0 0 8px; color: #c8d4ea; font-size: 1.2rem; }
    .state-box p  { margin: 0 0 20px; font-size: 0.9rem; line-height: 1.6; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(79,142,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tickets list ── */
    .tickets-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 28px;
    }

    /* ── Ticket card ── */
    .ticket-card {
      background: var(--ticket-bg);
      border: 1px solid var(--ticket-border);
      border-radius: var(--ticket-radius);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeInUp 0.4s ease both;
    }
    .ticket-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-glow);
    }

    /* Accent bar at top */
    .ticket-accent-bar {
      height: 4px;
      background: linear-gradient(90deg, #4f8eff, #a855f7, #ec4899);
    }

    .ticket-inner { padding: 24px; }

    /* Header row */
    .ticket-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--ticket-border);
      padding-bottom: 16px;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ticket-route { flex: 1; min-width: 180px; }
    .ticket-route h3 {
      margin: 0 0 4px;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, #e2eaff, #a5c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ticket-route small { color: #6b7fa0; font-size: 0.82rem; }

    .ticket-codes { text-align: right; }
    .booking-code-chip {
      display: inline-block;
      background: linear-gradient(135deg, rgba(79,142,255,0.15), rgba(168,85,247,0.1));
      border: 1px solid rgba(79,142,255,0.3);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #a5c0ff;
      margin-bottom: 6px;
    }
    .tracking-chip {
      font-size: 0.78rem;
      color: #6b7fa0;
      font-family: 'Courier New', monospace;
    }
    .tracking-chip span { color: #4f8eff; }

    /* Body: details + QR */
    .ticket-body {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* Details grid */
    .ticket-details {
      flex: 1;
      min-width: 240px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4f6080;
      font-weight: 600;
    }
    .detail-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: #c8d4ea;
    }
    .detail-value.accent  { color: var(--accent); font-weight: 700; }
    .detail-value.success { color: var(--success); font-weight: 700; }
    .detail-value.cap     { text-transform: capitalize; }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-confirmed  { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .status-confirmed::before  { background: var(--success); }
    .status-pending    { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .status-pending::before    { background: var(--warning); }
    .status-cancelled  { background: rgba(239,68,68,0.12);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.3); }
    .status-cancelled::before  { background: var(--danger); }

    /* QR Panel */
    .ticket-qr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 140px;
    }
    .qr-wrapper {
      background: #ffffff;
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .qr-label {
      font-size: 0.72rem;
      color: #4f6080;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Divider */
    .ticket-divider {
      border: none;
      border-top: 1px dashed rgba(255,255,255,0.06);
      margin: 20px 0 16px;
      position: relative;
    }
    .ticket-divider::before,
    .ticket-divider::after {
      content: '';
      width: 18px; height: 18px;
      background: #0c1220;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      position: absolute;
      top: 50%; transform: translateY(-50%);
    }
    .ticket-divider::before { left: -9px; }
    .ticket-divider::after  { right: -9px; }

    /* Footer actions */
    .ticket-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn-track {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, rgba(79,142,255,0.15), rgba(79,142,255,0.05));
      border: 1px solid rgba(79,142,255,0.4);
      color: var(--accent);
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .btn-track:hover {
      background: linear-gradient(135deg, rgba(79,142,255,0.25), rgba(79,142,255,0.1));
      box-shadow: 0 0 20px rgba(79,142,255,0.3);
      transform: translateY(-1px);
    }

    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8a9ab5;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-print:hover {
      background: rgba(255,255,255,0.08);
      color: #c8d4ea;
    }

    /* Retry button */
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #4f8eff, #a855f7);
      color: #fff;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s ease;
    }
    .retry-btn:hover { opacity: 0.85; }

    /* Print styles */
    @media print {
      .site-header, .ticket-footer, .btn-track, .btn-print { display: none !important; }
      .ticket-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
      body { background: white !important; color: #111 !important; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .ticket-body { flex-direction: column; }
      .ticket-qr-panel { flex-direction: row; align-items: center; }
      .ticket-header { flex-direction: column; }
      .ticket-codes { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand">
        <a href="index.html">
          <div class="logo">🚌</div>
          <div>
            <h1>My Tickets</h1>
            <p>View and manage your booked rides.</p>
          </div>
        </a>
      </div>
      <nav></nav>
    </header>

    <main>
      <section class="page-panel">
        <div class="page-heading">
          <span class="eyebrow">Your Trips</span>
          <h2>Booked Tickets</h2>
        </div>

        <div id="tickets-list" class="tickets-container">
          <div class="state-box" id="loading-box">
            <div class="spinner"></div>
            <h3>Loading your tickets…</h3>
            <p id="loading-msg">Connecting to server. This may take a moment on first load.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Scripts -->
  <script src="config.js?v=5"></script>
  <script>
    // ── Auth guard and local booking fallback ──────────────────────
    const userStr = localStorage.getItem('user');
    const user = userStr ? JSON.parse(userStr) : null;

    function loadLocalBookings() {
      try {
        return JSON.parse(localStorage.getItem('riderrBookings') || '[]');
      } catch {
        return [];
      }
    }

    function getUserBookings(bookings, userId) {
      if (!userId) return bookings;
      return bookings.filter((booking) => !booking.user_id || booking.user_id === userId);
    }

    function isValidUUID(value) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(value);
    }

    // ── Load tickets ────────────────────────────────────────────
    async function loadTickets() {
      const container = document.getElementById('tickets-list');
      const waitMsg = document.getElementById('loading-msg');
      const localBookings = getUserBookings(loadLocalBookings(), user?.id);

      if (localBookings.length) {
        renderTickets(localBookings, container);
      }

      if (!user) {
        if (localBookings.length) {
          return;
        }

        showError(
          container,
          'Welcome to Riderr',
          'Sign in to sync your bookings, or book a new ticket now.',
          'login.html'
        );
        return;
      }

      if (!isValidUUID(user.id)) {
        if (localBookings.length) {
          return;
        }

        showError(
          container,
          'Session expired.',
          'Your login session is invalid. Please sign in again.',
          'login.html'
        );
        return;
      }

      try {
        await apiReady;
        if (waitMsg) waitMsg.textContent = isLocalApi()
          ? 'Loading your tickets…'
          : 'Connecting to server…';

        const awake = await wakeServer(90000, (elapsed) => {
          if (waitMsg) {
            waitMsg.textContent = `Server is starting up… ${elapsed}s (this only happens once)`;
          }
        });

        if (!awake) {
          if (localBookings.length) {
            return;
          }

          showError(
            container,
            'Server took too long to respond.',
            'The server may still be waking up. Please wait a moment and click Try Again.'
          );
          return;
        }

        if (waitMsg) waitMsg.textContent = 'Loading your tickets…';
        const response = await fetchWithTimeout(
          `${API_URL}/user/${encodeURIComponent(user.id)}/bookings`,
          {},
          60000
        );
        const data = await response.json();

        if (response.ok) {
          const combined = [...localBookings, ...data.bookings];
          renderTickets(combined, container);
        } else if (!localBookings.length) {
          showError(container, data.message || 'Failed to load tickets.', data.details || data.detail || '');
        }
      } catch (err) {
        console.error('Error fetching tickets:', err);
        if (localBookings.length) {
          return;
        }

        const detail = err?.name === 'AbortError'
          ? 'The request timed out. Click Try Again.'
          : (err?.message || 'Unknown error. Make sure the server is running and open http://localhost:3000');
        showError(container, 'Could not reach the server.', detail);
      }
    }

    let qrLibPromise;
    function loadQrLib() {
      if (window.QRCode) return Promise.resolve();
      if (!qrLibPromise) {
        qrLibPromise = new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
          script.onload = resolve;
          script.onerror = () => reject(new Error('QR library failed to load'));
          document.head.appendChild(script);
        });
      }
      return qrLibPromise;
    }

    function showError(container, title, detail, redirectUrl) {
      const action = redirectUrl
        ? `<a href="${redirectUrl}" class="retry-btn" style="text-decoration:none;">Sign In Again</a>`
        : `<button class="retry-btn" onclick="retryLoad()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            Try Again
          </button>`;

      container.innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <h3>${title}</h3>
          <p>${detail}</p>
          ${action}
        </div>`;
    }

    function retryLoad() {
      const container = document.getElementById('tickets-list');
      container.innerHTML = `
        <div class="state-box" id="loading-box">
          <div class="spinner"></div>
          <h3>Loading your tickets…</h3>
          <p id="loading-msg">Reconnecting to server…</p>
        </div>`;
      loadTickets();
    }

    // ── Render tickets ──────────────────────────────────────────
    async function renderTickets(bookings, container) {
      if (!bookings || bookings.length === 0) {
        container.innerHTML = `
          <div class="state-box">
            <div class="state-icon">🎟️</div>
            <h3>No tickets yet</h3>
            <p>You haven't booked any trips. Find a route and book your first ride!</p>
            <a href="booking.html" class="retry-btn" style="text-decoration:none;">Book a Ride</a>
          </div>`;
        return;
      }

      try {
        await loadQrLib();
      } catch (err) {
        console.warn('QR library unavailable:', err);
      }

      container.innerHTML = '';

      bookings.forEach((booking, idx) => {
        const trip  = booking.trips;
        const route = trip ? trip.routes : null;
        const bus   = trip ? trip.buses  : null;
        const seat  = booking.seats ? booking.seats.seat_number : 'N/A';

        const dateStr = trip ? new Date(trip.departure_time).toLocaleDateString('en-NG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
        const timeStr = trip ? new Date(trip.departure_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'N/A';

        const origin      = route ? route.from_city          : 'Unknown';
        const destination = route ? route.to_city            : 'Unknown';
        const destAddress = route ? (route.destination_address || 'Main Terminal') : 'Main Terminal';
        const busName     = bus ? bus.name         : 'N/A';
        const plate       = bus ? bus.plate_number : '';
        const trackingCode = trip ? trip.tracking_code : 'N/A';
        const totalPrice  = booking.total_price ? `₦${Number(booking.total_price).toLocaleString()}` : 'N/A';
        const status      = (booking.status || 'confirmed').toLowerCase();
        const statusClass = status === 'confirmed' ? 'status-confirmed'
                          : status === 'cancelled' ? 'status-cancelled'
                          : 'status-pending';

        const qrId = `qr-${booking.booking_code}`;

        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.style.animationDelay = `${idx * 80}ms`;
        card.innerHTML = `
          <div class="ticket-accent-bar"></div>
          <div class="ticket-inner">

            <div class="ticket-header">
              <div class="ticket-route">
                <h3>${origin} &rarr; ${destination}</h3>
                <small>📍 ${destAddress}</small>
              </div>
              <div class="ticket-codes">
                <div class="booking-code-chip">${booking.booking_code}</div>
                <div class="tracking-chip">Track: <span>${trackingCode}</span></div>
              </div>
            </div>

            <div class="ticket-body">
              <div class="ticket-details">
                <div class="detail-item">
                  <span class="detail-label">Passenger</span>
                  <span class="detail-value">${booking.passenger_name}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Date</span>
                  <span class="detail-value">${dateStr}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Departure</span>
                  <span class="detail-value accent">🕐 ${timeStr}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Seat</span>
                  <span class="detail-value accent">💺 ${seat}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Bus</span>
                  <span class="detail-value">${busName} <small style="color:#4f6080;">${plate ? `(${plate})` : ''}</small></span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Total Paid</span>
                  <span class="detail-value success">${totalPrice}</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Status</span>
                  <span class="status-badge ${statusClass}">${booking.status || 'Confirmed'}</span>
                </div>
              </div>

              <div class="ticket-qr-panel">
                <div class="qr-wrapper">
                  <canvas id="${qrId}" width="128" height="128"></canvas>
                </div>
                <span class="qr-label">Scan at boarding</span>
              </div>
            </div>

            <hr class="ticket-divider" />

            <div class="ticket-footer">
              <a class="btn-track" href="gps-tracking.html?code=${encodeURIComponent(trackingCode)}">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
                Track Bus
              </a>
              <button class="btn-print" onclick="window.print()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Print Ticket
              </button>
            </div>
          </div>`;

        container.appendChild(card);

        // Generate QR code for this booking
        const qrCanvas = document.getElementById(qrId);
        if (qrCanvas && window.QRCode) {
          const qrPayload = JSON.stringify({
            booking: booking.booking_code,
            tracking: trackingCode,
            seat: seat,
            passenger: booking.passenger_name
          });
          QRCode.toCanvas(qrCanvas, qrPayload, {
            width: 128,
            margin: 1,
            color: { dark: '#111111', light: '#ffffff' }
          }, err => { if (err) console.warn('QR error:', err); });
        }
      });
    }

    // ── Start ───────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadTickets();
    });
  </script>
  <script src="nav.js"></script>
</body>
</html>
