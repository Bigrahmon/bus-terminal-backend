<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riderr | My Tickets</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tickets-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }
    .ticket-card {
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ticket-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }
    .ticket-header h3 {
      margin: 0;
      color: var(--primary-light);
    }
    .ticket-code {
      font-weight: 600;
      font-family: monospace;
      font-size: 1.1rem;
      background: var(--bg-color);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }
    .ticket-body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .ticket-detail {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .detail-value {
      font-weight: 500;
    }
    .ticket-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }
    .no-tickets {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      background: var(--surface-bg);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border-color);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand">
        <a href="index.html">
          <div class="logo">🚌</div>
          <div>
            <h1>My Tickets</h1>
            <p>View and manage your booked rides.</p>
          </div>
        </a>
      </div>
      <nav></nav>
    </header>

    <main>
      <section class="page-panel">
        <div class="page-heading">
          <span class="eyebrow">Your Trips</span>
          <h2>Booked Tickets</h2>
        </div>

        <div id="tickets-list" class="tickets-container">
          <div class="no-tickets">Loading tickets...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const userStr = localStorage.getItem('user');
      if (!userStr) {
        alert('Please login to view your tickets');
        window.location.href = 'login.html';
        return;
      }

      const user = JSON.parse(userStr);
      if (!user || !user.id) {
        alert('Invalid user session. Please login again.');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
        return;
      }
      const ticketsContainer = document.getElementById('tickets-list');

      try {
        const response = await fetch(`${API_URL}/user/${user.id}/bookings`);
        const data = await response.json();
        
        if (response.ok) {
          renderTickets(data.bookings, ticketsContainer);
        } else {
          console.error('Server returned error:', data);
          ticketsContainer.innerHTML = `<div class="no-tickets">Failed to load tickets. <br><small>${data.message || ''} ${data.details || ''}</small></div>`;
        }
      } catch (err) {
        console.error('Error fetching tickets:', err);
        ticketsContainer.innerHTML = '<div class="no-tickets">Network error. Please try again later.</div>';
      }
    });

    function renderTickets(bookings, container) {
      if (!bookings || bookings.length === 0) {
        container.innerHTML = '<div class="no-tickets">You have no booked tickets yet. <br><br> <a href="index.html#tickets" class="primary-button" style="display:inline-block; margin-top: 10px;">Book a Ride</a></div>';
        return;
      }

      let html = '';
      bookings.forEach(booking => {
        const trip = booking.trips;
        const route = trip ? trip.routes : null;
        const bus = trip ? trip.buses : null;
        const seat = booking.seats ? booking.seats.seat_number : 'N/A';
        
        // Format dates
        const dateStr = trip ? new Date(trip.departure_time).toLocaleDateString() : 'N/A';
        const timeStr = trip ? new Date(trip.departure_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'N/A';
        
        const origin = route ? route.from_city : 'Unknown';
        const destination = route ? route.to_city : 'Unknown';
        const destAddress = route ? route.destination_address : 'Main Terminal';
        const busName = bus ? bus.name : 'Unknown';
        const plate = bus ? bus.plate_number : '';
        const trackingCode = trip ? trip.tracking_code : 'N/A';
        const totalPrice = booking.total_price ? `₦${booking.total_price.toLocaleString()}` : 'N/A';
        
        // Data to encode in QR
        const qrData = JSON.stringify({
          booking: booking.booking_code,
          tracking: trackingCode,
          seat: seat
        });

        html += `
          <div class="ticket-card">
            <div class="ticket-header">
              <div>
                <h3>${origin} &rarr; ${destination}</h3>
                <small style="color: var(--text-muted);">${destAddress}</small>
              </div>
              <div style="text-align: right;">
                <span class="ticket-code">${booking.booking_code}</span>
                <div style="margin-top: 4px; font-size: 0.85rem;">Track: ${trackingCode}</div>
              </div>
            </div>
            
            <div style="display: flex; gap: 20px; align-items: center;">
              <div class="ticket-body" style="flex: 1;">
                <div class="ticket-detail">
                  <span class="detail-label">Passenger</span>
                  <span class="detail-value">${booking.passenger_name}</span>
                </div>
                <div class="ticket-detail">
                  <span class="detail-label">Date & Time</span>
                  <span class="detail-value">${dateStr} at ${timeStr}</span>
                </div>
                <div class="ticket-detail">
                  <span class="detail-label">Seat</span>
                  <span class="detail-value" style="color: var(--primary-light); font-weight: bold;">${seat}</span>
                </div>
                <div class="ticket-detail">
                  <span class="detail-label">Bus Details</span>
                  <span class="detail-value">${busName} <small>(${plate})</small></span>
                </div>
                <div class="ticket-detail">
                  <span class="detail-label">Total Price</span>
                  <span class="detail-value" style="color: var(--primary-light);">${totalPrice}</span>
                </div>
                <div class="ticket-detail">
                  <span class="detail-label">Status</span>
                  <span class="detail-value" style="text-transform: capitalize; color: #4ade80;">${booking.status || 'Confirmed'}</span>
                </div>
              </div>
              
              <div class="ticket-qr">
                <canvas id="qr-${booking.booking_code}" width="120" height="120" style="border-radius: 8px; background: white; padding: 4px;"></canvas>
              </div>
            </div>
            
            <div class="ticket-footer">
              <button class="secondary-button" onclick="window.print()">Print Ticket</button>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      
      // Generate QR codes after adding to DOM
      bookings.forEach(booking => {
        const trip = booking.trips;
        const trackingCode = trip ? trip.tracking_code : 'N/A';
        const qrData = JSON.stringify({
          booking: booking.booking_code,
          tracking: trackingCode
        });
        
        const canvas = document.getElementById(`qr-${booking.booking_code}`);
        if (canvas) {
          QRCode.toCanvas(canvas, qrData, { width: 120, margin: 1, color: { dark: '#000000', light: '#ffffff' } }, function (error) {
            if (error) console.error(error);
          });
        }
      });
    }
  </script>
  <script src="nav.js"></script>
</body>
</html>
